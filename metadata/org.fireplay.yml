AutoName: FirePlay
Description: |
    FirePlay is an open-source AirPlay 2 receiver for Fire TV and Android TV
    devices. It pairs with iOS 17/18 and renders Music (ALAC), Photos
    (still + H.264 video), and AirPlay-cast videos with sound.

    What it does NOT do (yet):
    * iPhone screen mirroring from Control Center
    * Netflix / Disney+ casting (Apple FairPlay DRM blocks non-licensed receivers)

